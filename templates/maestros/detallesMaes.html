{% extends "layouts.html" %}
{% block container %}

<div class="group py-32 relative overflow-x-auto sm:rounded-lg">
    <div class="relative bg-white max-w-xs w-full p-6 border border-gray-200 rounded-lg shadow-md">

        <!-- Dropdown botón -->
        <button id="dropdownButton"
            data-dropdown-toggle="dropdown"
            class="absolute top-2 end-2 text-gray-500 hover:text-gray-800 bg-white hover:bg-gray-100 focus:ring-4 focus:ring-gray-200 rounded-lg p-1.5 focus:outline-none"
            type="button">
            <span class="sr-only">Open dropdown</span>
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2"
                viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="1"/>
                <circle cx="19" cy="12" r="1"/>
                <circle cx="5" cy="12" r="1"/>
            </svg>
        </button>

        <!-- Dropdown -->
        <div id="dropdown"
            class="z-10 hidden bg-white divide-y divide-gray-100 rounded-lg shadow w-36">
            <ul class="py-2 text-sm text-gray-700">
                <li>
                    <a href="#" class="block px-4 py-2 hover:bg-gray-100">
                        Editar
                    </a>
                </li>
                <li>
                    <a href="#" class="block px-4 py-2 hover:bg-gray-100 text-red-600">
                        Eliminar
                    </a>
                </li>
            </ul>
        </div>

        <!-- Contenido -->
        <div class="flex flex-col items-center mt-4">

            <img class="w-24 h-24 mb-6 rounded-full"
                src="{{ url_for('static', filename='img/usuario.png') }}"
                alt="Usuario"/>

            <h5 class="mb-2 text-xl font-semibold text-gray-900">
               Nombre: {{ nombre }} {{ apellidos }}
            </h5>

            <p class="text-gray-600 mb-1">
               Email: {{ email }}
            </p>

            <p class="text-gray-600 mb-4">
                Especialidad: {{ especialidad }}
            </p>

            <!-- Botones -->
            <div class="flex gap-4">

                <!-- Regresar -->
                <a href="{{ url_for('maestros.maestros') }}"
                   class="text-white bg-blue-600 hover:bg-blue-700 font-medium rounded-lg text-sm px-5 py-2.5 transition">
                    Regresar
                </a>

            </div>

        </div>
    </div>
</div>

{% endblock %}
